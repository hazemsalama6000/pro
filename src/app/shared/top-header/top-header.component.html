<header class="app-header">
  <div class="header-inner">

    <!-- Brand -->
    <a class="header-brand" routerLink="/employee/employees">
      <div class="brand-icon">
        <i class="pi pi-users"></i>
      </div>
      <span class="brand-name">WorkForce Pro</span>
    </a>

    <!-- Navigation -->
    <nav class="header-nav">
      <a
        class="nav-item"
        routerLink="/employee/employees"
        routerLinkActive="active"
      >
        <i class="pi pi-th-large"></i>
        <span>Dashboard</span>
      </a>
      <a
        class="nav-item"
        routerLink="/employee/employees"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        <i class="pi pi-users"></i>
        <span>Employees</span>
      </a>
    </nav>

    <!-- Right actions -->
    <div class="header-actions">

      <!-- Language switcher -->
      <div class="dropdown">
        <button class="icon-btn dropdown-toggle" data-bs-toggle="dropdown" aria-label="Language" title="Switch language">
          <i class="pi pi-globe"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end lang-menu">
          <li>
            <a class="dropdown-item" (click)="setLang('en')">
              <span class="lang-flag">🇺🇸</span> English
            </a>
          </li>
          <li>
            <a class="dropdown-item" (click)="setLang('ar')">
              <span class="lang-flag">🇸🇦</span> العربية
            </a>
          </li>
        </ul>
      </div>

      <!-- User menu -->
      <div class="dropdown">
        <button class="user-trigger dropdown-toggle" data-bs-toggle="dropdown">
          <div class="user-avatar">{{ userInitial() }}</div>
          <span class="user-display-name">{{ userName() }}</span>
          <i class="pi pi-angle-down chevron"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end user-dropdown">
          <li class="user-dropdown-profile">
            <div class="profile-avatar">{{ userInitial() }}</div>
            <div class="profile-info">
              <div class="profile-name">{{ userName() }}</div>
              <div class="profile-role">Administrator</div>
            </div>
          </li>
          <li><hr class="dropdown-divider my-1" /></li>
          <li>
            <a class="dropdown-item logout-item" (click)="logout()">
              <i class="pi pi-sign-out"></i>
              Sign out
            </a>
          </li>
        </ul>
      </div>

    </div>
  </div>
</header>
